unbind r
bind r source-file ~/.tmux.conf

set -g prefix C-Space

set -g mouse on
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*:Tc"
set -ga terminal-features ",*:hyperlinks"
set -g allow-passthrough on
set -g status-position top
set -g base-index 1
set -g renumber-windows on
setw -g mode-keys vi
set -g allow-rename off
setw -g automatic-rename off

# Quality of life
set -g escape-time 0
set -g history-limit 50000
set -g focus-events on
set -g detach-on-destroy off
set -g display-time 4000
set -g set-clipboard on
set -g status-interval 5

# Intuitive split bindings + new windows inherit current path
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"
bind v new-window -c "#{pane_current_path}" nvim

# Vim-style pane resizing (repeatable with -r)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Vi copy mode improvements
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"

# Quick window switching (no prefix needed)
bind -n S-Left previous-window
bind -n S-Right next-window
bind Space last-window
bind N command-prompt -p "New session name:" "new-session -s '%%'"

# Dim inactive panes
set -g window-style 'fg=#a6adc8,bg=#1e1e2e'
set -g window-active-style 'fg=#cdd6f4,bg=#181825'

# Monitor windows for bell (triggered by Claude Code hook when input needed)
setw -g monitor-bell on
set -g visual-bell off

# Configure the catppuccin plugin
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_status_connect_separator "no"
run-shell 'printf -v rs "\xee\x82\xb4 "; tmux set -g @catppuccin_status_right_separator "$rs"'
set -g @catppuccin_window_number_position "right"
set -g @catppuccin_window_default_text " #{window_name}"
set -g @catppuccin_window_current_text " #{window_name}"
set -g @catppuccin_window_text " #{window_name}"

run ~/.tmux/plugins/tmux/catppuccin.tmux

# Make the status line pretty and add some modules
set -g status-right-length 100
set -g status-left-length 100
set -g status-left "#{E:@catppuccin_status_session}"
set -g status-right "#{E:@catppuccin_status_directory}"

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'omerxx/tmux-sessionx'
set -g @plugin 'jaclu/tmux-menus'
set -g @plugin 'wfxr/tmux-fzf-url'
set -g @plugin 'sainnhe/tmux-fzf'

# Auto-save and restore sessions across reboots
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

run '~/.tmux/plugins/tpm/tpm'

